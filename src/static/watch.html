<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>🔴 Live Padel — Spovio</title>
    <link rel="icon" type="image/png" href="/static/spovio-favicon.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden
        }

        /* VIDEO */
        #video-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000
        }

        #stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #000
        }

        /* Offline */
        #offline {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #64748b
        }

        #offline .icon {
            font-size: 64px
        }

        #offline p {
            font-size: 18px;
            text-align: center;
            max-width: 300px
        }

        /* Loading */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 50;
            gap: 14px;
        }

        #loading.hidden {
            display: none
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 3px solid rgba(255, 255, 255, .15);
            border-top-color: #ef4444;
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        #loading p {
            color: #94a3b8;
            font-size: 13px
        }

        /* OVERLAYS */
        .overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none
        }

        /* Logo club haut-gauche */
        #logo-overlay {
            top: 14px;
            left: 14px;
            pointer-events: auto
        }

        #logo-img {
            height: 52px;
            width: auto;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, .8));
            display: none
        }

        #club-name-txt {
            font-size: 11px;
            color: rgba(255, 255, 255, .7);
            margin-top: 3px;
            letter-spacing: 1px;
            text-transform: uppercase
        }

        /* LIVE badge haut droit */
        #live-badge {
            top: 14px;
            right: 14px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(239, 68, 68, .6);
        }

        /* Viewers count */
        #viewers {
            top: 50px;
            right: 14px;
            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(6px);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            color: rgba(255, 255, 255, .7);
        }

        /* Spovio watermark bas-droit */
        #spovio-watermark {
            position: fixed;
            bottom: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 5px 12px 5px 8px;
            z-index: 15;
        }

        #spovio-watermark img {
            height: 20px;
            opacity: .9
        }

        #spovio-watermark span {
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, .8);
            letter-spacing: 1px
        }

        /* Score overlay bas */
        #score-overlay {
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, .92) 0%, rgba(0, 0, 0, .5) 80%, transparent 100%);
            padding: 24px 20px 40px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 12px
        }

        .team-block {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .team-block.right {
            align-items: flex-end
        }

        .player-name {
            font-size: clamp(11px, 2vw, 15px);
            color: rgba(255, 255, 255, .75);
            font-weight: 600;
            letter-spacing: .5px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 40vw
        }

        .sets-games {
            display: flex;
            align-items: baseline;
            gap: 8px
        }

        .set-val {
            font-size: clamp(14px, 2.5vw, 20px);
            font-weight: 700;
            color: #3b82f6
        }

        .game-val {
            font-size: clamp(12px, 2vw, 16px);
            color: rgba(255, 255, 255, .6)
        }

        .point-val {
            font-family: 'Orbitron', monospace;
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(180deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .point-val.adv {
            -webkit-text-fill-color: #10b981;
            background: none
        }

        .score-sep {
            font-family: 'Orbitron', monospace;
            font-size: clamp(24px, 5vw, 48px);
            color: rgba(255, 255, 255, .3);
            text-align: center;
            padding-bottom: 4px
        }

        /* Deuce */
        #deuce-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(245, 158, 11, .95);
            color: #000;
            padding: 10px 28px;
            border-radius: 12px;
            font-family: 'Orbitron', monospace;
            font-size: clamp(18px, 4vw, 28px);
            font-weight: 900;
            letter-spacing: 3px;
            display: none;
            z-index: 20;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
        }

        #deuce-banner.show {
            display: block
        }

        /* Share button */
        #share-btn {
            position: fixed;
            top: 14px;
            right: 110px;
            z-index: 15;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, .2);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            pointer-events: auto;
        }

        #share-btn:hover {
            background: rgba(255, 255, 255, .25)
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 12px;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            z-index: 99;
        }

        #toast.show {
            opacity: 1
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Connexion au live en cours...</p>
    </div>

    <!-- Video -->
    <div id="video-container">
        <video id="stream" playsinline autoplay muted></video>
        <div id="offline">
            <div class="icon">📺</div>
            <p>Live terminé ou en attente de démarrage...</p>
        </div>
    </div>

    <!-- Overlays -->
    <div class="overlay" id="live-badge">🔴 LIVE</div>
    <div class="overlay" id="viewers">👁 —</div>

    <div class="overlay" id="logo-overlay">
        <img id="logo-img" src="" alt="Logo" />
        <div id="club-name-txt"></div>
    </div>

    <div id="spovio-watermark">
        <img src="/static/spovio-logo.png" alt="Spovio" />
        <span>SPOVIO</span>
    </div>

    <div id="deuce-banner">⚖️ DEUCE</div>
    <button id="share-btn" onclick="copyLink()">🔗 Partager</button>

    <!-- Score overlay -->
    <div class="overlay" id="score-overlay">
        <div class="score-grid">
            <div class="team-block">
                <div class="player-name" id="name-a">—</div>
                <div class="sets-games">
                    <span class="set-val" id="set-a">0</span>
                    <span class="game-val" id="game-a">0</span>
                </div>
                <div class="point-val" id="pt-a">0</div>
            </div>
            <div class="score-sep">:</div>
            <div class="team-block right">
                <div class="player-name" id="name-b">—</div>
                <div class="sets-games" style="flex-direction:row-reverse">
                    <span class="set-val" id="set-b">0</span>
                    <span class="game-val" id="game-b">0</span>
                </div>
                <div class="point-val" id="pt-b">0</div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const code = location.pathname.split('/').pop();
        const API = '';
        const viewerId = Math.random().toString(36).slice(2);
        let liveStopped = false;

        // ── Toast ──
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }
        function copyLink() {
            navigator.clipboard.writeText(location.href).then(() => toast('✅ Lien copié !'));
        }

        // ── HLS Player ──
        function initHLS() {
            const video = document.getElementById('stream');
            const hlsUrl = `${API}/api/live/${code}/hls/stream.m3u8`;

            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 30,
                });
                hls.loadSource(hlsUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => { });
                    hideLoading();
                });
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) { showOffline(); }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari natif HLS
                video.src = hlsUrl;
                video.addEventListener('loadedmetadata', () => { video.play(); hideLoading(); });
                video.addEventListener('error', showOffline);
            } else {
                showOffline();
            }
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }
        function showOffline() {
            if (liveStopped) return;
            liveStopped = true;
            hideLoading();
            document.getElementById('stream').style.display = 'none';
            document.getElementById('offline').style.display = 'flex';
            document.getElementById('live-badge').innerHTML = '⬛ LIVE TERMINÉ';
            document.getElementById('live-badge').style.background = 'rgba(100,116,139,.8)';
            document.getElementById('live-badge').style.boxShadow = 'none';
        }

        // ── Heartbeat (toutes les 10s) ──
        function heartbeat() {
            fetch(`${API}/api/live/${code}/heartbeat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ viewer_id: viewerId })
            }).catch(() => { });
        }
        heartbeat();
        setInterval(heartbeat, 10000);

        // ── Info + score (toutes les 2s) ──
        async function updateInfo() {
            try {
                const r = await fetch(`${API}/api/live/${code}/info`);
                if (!r.ok) { if (!liveStopped) showOffline(); return; }
                const d = await r.json();
                if (!d.active && !liveStopped) { showOffline(); return; }

                document.getElementById('name-a').textContent = d.team_a || 'Équipe A';
                document.getElementById('name-b').textContent = d.team_b || 'Équipe B';
                document.getElementById('club-name-txt').textContent = d.club_name || '';
                document.getElementById('viewers').textContent = `👁 ${d.viewer_count || 0}`;

                if (d.logo_url) {
                    const img = document.getElementById('logo-img');
                    img.src = d.logo_url; img.style.display = 'block';
                }

                const s = d.score || {};
                document.getElementById('pt-a').textContent = s.pt_a_label ?? s.pt_a ?? '0';
                document.getElementById('pt-b').textContent = s.pt_b_label ?? s.pt_b ?? '0';
                document.getElementById('game-a').textContent = s.game_a ?? 0;
                document.getElementById('game-b').textContent = s.game_b ?? 0;
                document.getElementById('set-a').textContent = s.set_a ?? 0;
                document.getElementById('set-b').textContent = s.set_b ?? 0;

                document.getElementById('pt-a').className = 'point-val' + (s.pt_a_label === 'ADV' ? ' adv' : '');
                document.getElementById('pt-b').className = 'point-val' + (s.pt_b_label === 'ADV' ? ' adv' : '');

                const db = document.getElementById('deuce-banner');
                if (s.deuce) {
                    db.classList.add('show');
                    if (s.advantage) {
                        db.textContent = '🏆 AVANTAGE — ' + (s.advantage === 'a' ? d.team_a : d.team_b);
                        db.style.background = 'rgba(16,185,129,.95)';
                    } else {
                        db.textContent = '⚖️ DEUCE';
                        db.style.background = 'rgba(245,158,11,.95)';
                    }
                } else { db.classList.remove('show'); }

            } catch (e) { }
        }

        initHLS();
        updateInfo();
        setInterval(updateInfo, 2000);
    </script>
</body>

</html>
